name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Validate
        run: make check

      - name: Build distributions
        run: make package

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Generate Homebrew formula
        run: |
          python scripts/generate_homebrew_formula.py --repo "${{ github.repository }}" --output Formula/tidgit.rb

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            Formula/tidgit.rb
